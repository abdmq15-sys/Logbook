 --bg:#07090b;--panel:#0e1418;--panel-2:#131c22;--line:#202c33;--ink:#e6edf1;--muted:#7a8b95;
 --amber:#e9a534;--amber-dim:#b07d18;--cyan:#3fb6ce;--night:#6b8cff;--red:#e2625f;--green:#46c98f;
}
html,body{background:var(--bg);}
body{
 min-height:100vh;color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;direction:rtl;
 background:radial-gradient(1100px 560px at 82% -10%, rgba(233,165,52,.05), transparent 60%), var(--bg);
 padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 50px);
}
.wrap{max-width:1180px;margin:0 auto;}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),var(--panel));border-radius:14px;padding:15px 16px;}
.brand{display:flex;align-items:center;gap:13px;}
.ic{width:46px;height:46px;border-radius:12px;background:#000;border:1px solid #2b3941;display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03),0 4px 14px rgba(0,0,0,.5);}
.ic img{width:30px;height:30px;}
.title{font-family:'Saira Condensed';font-weight:700;font-size:25px;letter-spacing:.8px;line-height:1;}
.sub{color:var(--muted);font-size:12.5px;margin-top:3px;}
.ptag{font-family:'Saira Condensed';font-weight:700;letter-spacing:1.8px;background:rgba(255,255,255,.04);color:var(--ink);border:1px solid var(--line);padding:7px 14px;border-radius:8px;font-size:13.5px;}
.ptag b{color:var(--amber);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.stat{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:12px;text-align:center;position:relative;overflow:hidden;}
.stat .k{color:var(--muted);font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
.stat .v{font-family:'IBM Plex Mono';font-weight:700;font-size:26px;line-height:1.1;margin-top:5px;}
.stat.total .v{color:var(--amber);}.stat.day .v{color:var(--green);}.stat.night .v{color:var(--night);}.stat.flights .v{color:var(--cyan);}
.bar{position:absolute;bottom:0;right:0;left:0;height:3px;}
.stat.total .bar{background:var(--amber);}.stat.day .bar{background:var(--green);}.stat.night .bar{background:var(--night);}.stat.flights .bar{background:var(--cyan);}
.card{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px;margin-top:14px;}
.ctitle{font-family:'Saira Condensed';font-weight:700;font-size:16px;letter-spacing:.8px;color:var(--amber);margin-bottom:13px;text-transform:uppercase;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.label{font-size:12px;color:var(--muted);font-weight:600;}
.in,.sel{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;font-size:16px;font-family:'IBM Plex Sans Arabic';outline:none;transition:border-color .15s,box-shadow .15s;appearance:none;}
.sel{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%237a8b95' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:left 12px center;padding-left:34px;}
.in:focus,.sel:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(233,165,52,.13);}
.in.num{font-family:'IBM Plex Mono';font-weight:700;font-size:18px;text-align:center;letter-spacing:1px;}
.row-in{display:flex;gap:6px;align-items:stretch;}
.row-in .sel{flex:1;}
.mini{flex:0 0 auto;width:46px;border-radius:10px;border:1px solid var(--amber-dim);background:rgba(233,165,52,.07);color:var(--amber);font-size:22px;font-weight:700;cursor:pointer;line-height:1;}
.mini:active{transform:scale(.93);}
.addin{display:flex;gap:6px;margin-top:6px;}
.addin .in{flex:1;}
.addin button{border:none;border-radius:10px;padding:0 16px;font-weight:700;cursor:pointer;font-family:'IBM Plex Sans Arabic';}
.addin .ok{background:var(--green);color:#06231a;}
.addin .no{background:var(--panel-2);color:var(--muted);border:1px solid var(--line);}
.hide{display:none;}
.seg{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);padding:12px 0;font-weight:700;cursor:pointer;font-family:'Saira Condensed';letter-spacing:1px;font-size:15px;}
.seg button.on-day{background:rgba(70,201,143,.16);color:var(--green);}
.seg button.on-night{background:rgba(107,140,255,.16);color:var(--night);}
.route{display:flex;gap:8px;align-items:flex-end;}
.route .field{flex:1;}
.route .arrow{color:var(--muted);font-family:'Saira Condensed';font-weight:700;padding-bottom:12px;font-size:18px;}
.submit{width:100%;margin-top:14px;border:none;cursor:pointer;background:linear-gradient(150deg,var(--amber),var(--amber-dim));color:#1a1206;font-weight:700;font-size:16px;padding:15px;border-radius:12px;font-family:'IBM Plex Sans Arabic';box-shadow:0 8px 22px rgba(233,165,52,.18);}
.submit:active{transform:scale(.985);}
.tcard{border:1px solid var(--line);background:var(--panel);border-radius:14px;margin-top:14px;overflow:hidden;}
.thead{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);}
.thead h3{font-family:'Saira Condensed';font-weight:700;font-size:16px;letter-spacing:.8px;color:var(--cyan);text-transform:uppercase;}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead th{background:var(--panel-2);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:11px 10px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--line);position:sticky;top:0;}
tbody td{padding:11px 10px;text-align:center;border-bottom:1px solid var(--line);font-size:14px;white-space:nowrap;}
.hrs{font-family:'IBM Plex Mono';font-weight:700;font-size:16px;color:var(--amber);}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;font-family:'Saira Condensed';letter-spacing:.5px;}
.pill.day{background:rgba(70,201,143,.14);color:var(--green);}
.pill.night{background:rgba(107,140,255,.14);color:var(--night);}
.with{font-family:'Saira Condensed';font-weight:600;letter-spacing:.5px;}
.ftype{font-family:'Saira Condensed';font-weight:600;color:var(--cyan);letter-spacing:.5px;}
.ac{font-family:'Saira Condensed';font-weight:600;letter-spacing:.5px;}
.rt{font-family:'IBM Plex Mono';font-weight:600;font-size:13px;}
.rt i{color:var(--muted);font-style:normal;margin:0 5px;}
.rmk{font-family:'IBM Plex Sans Arabic';color:var(--muted);font-size:13px;max-width:160px;overflow:hidden;text-overflow:ellipsis;}
.dt{font-family:'IBM Plex Mono';color:var(--muted);font-size:13px;}
.del{background:transparent;border:1px solid var(--line);color:var(--red);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;}
tfoot td{background:var(--panel-2);font-weight:700;padding:13px 10px;border-top:2px solid var(--amber-dim);}
tfoot .lbl{font-family:'Saira Condensed';letter-spacing:1px;color:var(--amber);font-size:14px;}
tfoot .sum{font-family:'IBM Plex Mono';font-size:18px;color:var(--amber);}
.empty{padding:38px 16px;text-align:center;color:var(--muted);font-size:14px;}
.foot{display:flex;justify-content:flex-end;padding:10px 14px;}
.reset{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:12.5px;padding:7px 12px;border-radius:9px;cursor:pointer;font-family:'IBM Plex Sans Arabic';}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>

<script>
var KEY="logbook:bishri:v1";
var DEFAULT_PILOTS=["BEJAD","SHALAN","ALI","MANSOUR","ESSA","KHORMI","SHAHRANI","ALNEAMAH","MUSFER","OSAMA","OJEIM","SADAAN"];
var DEFAULT_FTYPES=["C","F10","Hajj C","F - MULTI","C - MULTI","F - XC","C - XC","OMRH - C","F - HOIST"];

var state={entries:[],pilots:DEFAULT_PILOTS.slice(),aircraft:[],flightTypes:DEFAULT_FTYPES.slice(),remarks:[],places:[]};
var dn="DAY";

function load(){try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw);
  if(Array.isArray(d.entries))state.entries=d.entries;
  if(Array.isArray(d.pilots)&&d.pilots.length)state.pilots=d.pilots;
  if(Array.isArray(d.aircraft))state.aircraft=d.aircraft;
  if(Array.isArray(d.flightTypes)&&d.flightTypes.length)state.flightTypes=d.flightTypes;
  if(Array.isArray(d.remarks))state.remarks=d.remarks;
  if(Array.isArray(d.places))state.places=d.places;
}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

function el(id){return document.getElementById(id);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function today(){var d=new Date(),p=function(n){return(""+n).padStart(2,"0");};return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());}
function fmtDate(iso){if(!iso)return"—";var a=iso.split("-");return a[2]+"/"+a[1]+"/"+a[0];}

function fillSelect(id,arr,extraFirst){var s=el(id);var cur=s.value;s.innerHTML="";
  if(extraFirst){var o=document.createElement("option");o.value="";o.textContent=extraFirst;s.appendChild(o);}
  arr.forEach(function(v){var o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o);});
  if(cur&&arr.indexOf(cur)>=0)s.value=cur;
}
function fillPlaces(){var dl=el("places");dl.innerHTML="";state.places.forEach(function(p){var o=document.createElement("option");o.value=p;dl.appendChild(o);});}

function renderSelects(){
  fillSelect("f-with",state.pilots,null);
  fillSelect("f-ftype",state.flightTypes,null);
  fillSelect("f-ac",state.aircraft,state.aircraft.length?null:"— أضف من زر + —");
  fillSelect("f-rmk",state.remarks,"— بدون —");
  fillPlaces();
}

function totals(){var t=0,da=0,ni=0;state.entries.forEach(function(e){var h=parseFloat(e.hours)||0;t+=h;if(e.dayNight==="NIGHT")ni+=h;else da+=h;});
  return{total:t.toFixed(1),day:da.toFixed(1),night:ni.toFixed(1),flights:state.entries.length};}

function renderTable(){
  var tb=el("t-body");tb.innerHTML="";
  if(state.entries.length===0){
    tb.innerHTML='<tr><td colspan="10"><div class="empty">ما فيه رحلات مسجلة بعد — سجّل أول رحلة من فوق</div></td></tr>';
    el("t-foot").classList.add("hide");el("t-footactions").classList.add("hide");
  }else{
    state.entries.forEach(function(e){
      var tr=document.createElement("tr");
      tr.innerHTML=
        '<td class="hrs">'+(parseFloat(e.hours).toFixed(2))+'</td>'+
        '<td><span class="pill '+(e.dayNight==="NIGHT"?"night":"day")+'">'+esc(e.dayNight)+'</span></td>'+
        '<td>'+esc(e.sortie)+'</td>'+
        '<td class="with">'+esc(e.coPilot)+'</td>'+
        '<td class="ftype">'+esc(e.flightType)+'</td>'+
        '<td class="ac">'+esc(e.aircraft)+'</td>'+
        '<td class="rt">'+esc(e.from||"—")+'<i>←</i>'+esc(e.to||"—")+'</td>'+
        '<td class="dt">'+fmtDate(e.date)+'</td>'+
        '<td class="rmk" title="'+esc(e.remark)+'">'+esc(e.remark||"—")+'</td>'+
        '<td><button class="del" data-del="'+e.id+'">×</button></td>';
      tb.appendChild(tr);
    });
    el("t-foot").classList.remove("hide");el("t-footactions").classList.remove("hide");
  }
  var tt=totals();
  el("s-total").textContent=tt.total;el("s-day").textContent=tt.day;el("s-night").textContent=tt.night;el("s-flights").textContent=tt.flights;
  el("t-sum").textContent=tt.total;el("t-count").textContent="السجل · "+state.entries.length+" رحلة";
}

function addEntry(){
  var h=parseFloat(el("f-hours").value);
  if(!h||h<=0){alert("اكتب زمن الرحلة (الساعات) أول");return;}
  var from=(el("f-from").value||"").trim().toUpperCase();
  var to=(el("f-to").value||"").trim().toUpperCase();
  var e={id:Date.now()+""+Math.random().toString(16).slice(2),
    hours:h,dayNight:dn,sortie:el("f-sortie").value,coPilot:el("f-with").value,
    flightType:el("f-ftype").value,aircraft:el("f-ac").value||"—",
    from:from,to:to,date:el("f-date").value||today(),remark:el("f-rmk").value||""};
  state.entries.unshift(e);
  [from,to].forEach(function(p){if(p&&state.places.indexOf(p)<0)state.places.push(p);});
  save();fillPlaces();renderTable();
  el("f-hours").value="";el("f-from").value="";el("f-to").value="";
}

function setupAdd(kind,listName,selId,extraFirst){
  var box=el("add-"+kind);var input=box.querySelector(".in");
  function commit(){var v=(input.value||"").trim().toUpperCase();if(!v){box.classList.add("hide");return;}
    if(state[listName].indexOf(v)<0)state[listName].push(v);
    save();fillSelect(selId,state[listName],state[listName].length?null:extraFirst);el(selId).value=v;
    input.value="";box.classList.add("hide");}
  box.querySelector(".ok").onclick=commit;
  input.addEventListener("keydown",function(ev){if(ev.key==="Enter")commit();});
  box.querySelector(".no").onclick=function(){input.value="";box.classList.add("hide");};
}

function init(){
  load();
  el("f-date").value=today();
  renderSelects();renderTable();

  // day/night
  el("f-dn").addEventListener("click",function(ev){var b=ev.target.closest("button");if(!b)return;
    dn=b.getAttribute("data-dn");
    [].forEach.call(el("f-dn").children,function(c){c.className="";});
    b.className=(dn==="DAY"?"on-day":"on-night");
  });

  // open add boxes
  document.querySelectorAll(".mini[data-add]").forEach(function(btn){
    btn.addEventListener("click",function(){var k=btn.getAttribute("data-add");var box=el("add-"+k);
      box.classList.toggle("hide");if(!box.classList.contains("hide"))box.querySelector(".in").focus();});
  });
  setupAdd("with","pilots","f-with",null);
  setupAdd("ftype","flightTypes","f-ftype",null);
  setupAdd("ac","aircraft","f-ac","— أضف من زر + —");
  setupAdd("rmk","remarks","f-rmk","— بدون —");

  el("f-submit").addEventListener("click",addEntry);
  el("f-hours").addEventListener("keydown",function(ev){if(ev.key==="Enter")addEntry();});

  el("t-body").addEventListener("click",function(ev){var b=ev.target.closest("[data-del]");if(!b)return;
    var id=b.getAttribute("data-del");state.entries=state.entries.filter(function(e){return e.id!==id;});save();renderTable();});

  el("t-reset").addEventListener("click",function(){if(confirm("متأكد تبي تمسح كل السجلات؟ لا يمكن التراجع.")){state.entries=[];save();renderTable();}});
}
init();
</script>
</body>
</html>
